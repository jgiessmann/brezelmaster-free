<!doctype html>
<html lang="en">
  <head>
    <link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#2d6cdf" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brezel-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BREZEL-Master</title>
  </head>
  <body style="margin:0; background:#f5f5f5;">
  <div
    id="app-loading"
    style="
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      background:#ffffff;
      color:#333;
      text-align:center;
      padding:24px;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    "
  >
    <img
      src="/apple-touch-icon.png"
      alt="BREZEL-Master"
      style="width:140px; height:140px; object-fit:contain; margin-bottom:24px;"
    />

    <div style="font-size:30px; font-weight:bold; margin-bottom:28px;">
      BREZEL-Master
    </div>

    <div style="font-size:18px; color:#555; margin-bottom:20px;">
      App wird geladen - Einen Moment bitte
    </div>

    <div
      id="app-loading-error"
      style="display:none; font-size:16px; color:#c62828; max-width:420px; line-height:1.5;"
    >
      Hoppla, da ist wohl etwas schiefgelaufen :(. Bitte prüfen, ob eine stabile
      Internetverbindung besteht. Falls das Problem weiter besteht, den Entwickler kontaktieren
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
